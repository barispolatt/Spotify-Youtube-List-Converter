# ─────────────────────────────────────────────────────────────────────
# DEV environment overrides
# Usage: helm upgrade --install ... -f values-dev.yaml
# ─────────────────────────────────────────────────────────────────────

backend:
  replicas: 1
  resources:
    limits:
      memory: "1024Mi"
      cpu: "1500m"
    requests:
      memory: "512Mi"
      cpu: "300m"
  env:
    corsAllowedOrigins: "http://localhost:3000,http://localhost:5173"

frontend:
  replicas: 1
  resources:
    limits:
      memory: "100Mi"
      cpu: "500m"
    requests:
      memory: "50Mi"
      cpu: "100m"
