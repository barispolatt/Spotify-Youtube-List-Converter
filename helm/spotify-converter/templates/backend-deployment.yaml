apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spotify-converter.fullname" . }}-backend
  labels:
    {{- include "spotify-converter.labels" . | nindent 4 }}
    {{- include "spotify-converter.backend.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "spotify-converter.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spotify-converter.backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          env:
            - name: SPOTIFY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: SPOTIFY_CLIENT_ID
            - name: SPOTIFY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: SPOTIFY_CLIENT_SECRET
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: CORS_ALLOWED_ORIGINS
          ports:
            - containerPort: {{ .Values.backend.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.healthCheck.livenessInitialDelay }}
            periodSeconds: {{ .Values.backend.healthCheck.livenessPeriod }}
            failureThreshold: {{ .Values.backend.healthCheck.livenessFailureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: {{ .Values.backend.healthCheck.readinessInitialDelay }}
            periodSeconds: {{ .Values.backend.healthCheck.readinessPeriod }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
