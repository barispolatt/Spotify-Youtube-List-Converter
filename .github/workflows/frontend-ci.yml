name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - 'helm/**'

concurrency: 
  group: helm-deploy
  
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: spotify-youtube-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        cd frontend
        docker build \
          --build-arg VITE_LAMBDA_URL=${{ secrets.VITE_LAMBDA_URL }} \
          --build-arg VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL }} \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
        echo "registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT

    - name: Copy Helm chart to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "helm/*"
        target: "/home/ubuntu/spotify-project"

    - name: Deploy to EC2 (K3s via Helm)
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: ECR_REGISTRY,IMAGE_TAG,ECR_REPOSITORY
        script: |
          # Deploy via Helm (atomic: auto-rollback on failure)
          sudo helm upgrade --install spotify-converter \
            /home/ubuntu/spotify-project/helm/spotify-converter/ \
            -f /home/ubuntu/spotify-project/helm/spotify-converter/values-dev.yaml \
            --set frontend.image.repository=$ECR_REGISTRY/$ECR_REPOSITORY \
            --set frontend.image.tag=$IMAGE_TAG \
            --kubeconfig /etc/rancher/k3s/k3s.yaml \
            --atomic \
            --timeout 5m
