apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: youtube-backend
  template:
    metadata:
      labels:
        app: youtube-backend
    spec:
      containers:
      - name: backend
        image: REPLACE_ME_IMAGE_URL
        imagePullPolicy: Always
        env:
          - name: SPOTIFY_CLIENT_ID
            valueFrom:
              secretKeyRef:
                name: backend-secrets
                key: SPOTIFY_CLIENT_ID
          - name: SPOTIFY_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: backend-secrets
                key: SPOTIFY_CLIENT_SECRET
          - name: CORS_ALLOWED_ORIGINS
            valueFrom:
              secretKeyRef:
                name: backend-secrets
                key: CORS_ALLOWED_ORIGINS
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /api/v1/youtube/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/youtube/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          # t3.small (2GB RAM, 2 vCPU) - sized for JVM + concurrent yt-dlp
          limits:
            memory: "1024Mi"
            cpu: "1500m"
          requests:
            memory: "512Mi"
            cpu: "300m"