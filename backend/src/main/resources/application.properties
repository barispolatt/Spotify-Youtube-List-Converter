spring.application.name=backend
server.port=8080

# Spotify API Configuration
spotify.client.id=${SPOTIFY_CLIENT_ID:placeholder_id}
spotify.client.secret=${SPOTIFY_CLIENT_SECRET:placeholder_secret}

# CORS Configuration - comma-separated list of allowed frontend origins
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# SSE Configuration - keep async connections alive for up to 5 minutes (large playlists)
spring.mvc.async.request-timeout=300000
